# .github/workflows/check-new-release.yml

name: Check for New Release

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6:00 AM UTC
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update release.txt even if no new release'
        required: false
        type: boolean
        default: false

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for new release
        id: check
        run: |
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/mitradranirban/colr-pak/releases/latest)
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')

          echo "Latest release tag: $LATEST_TAG"

          if [ -f "release.txt" ]; then
            LAST_CHECKED=$(cat release.txt)
            echo "Last known release: $LAST_CHECKED"
          else
            LAST_CHECKED=""
            echo "No previous release.txt found"
          fi

          if { [ "$LATEST_TAG" != "$LAST_CHECKED" ] || [ "${{ inputs.force_update }}" = "true" ]; } && [ "$LATEST_TAG" != "null" ]; then
            echo "New release found: $LATEST_TAG"
            echo "$LATEST_TAG" > release.txt
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "release-tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "No new release. Nothing to do."
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit release.txt to trigger Launchpad build
        if: steps.check.outputs.updated == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add release.txt
          git commit -m "chore: update release.txt to ${{ steps.check.outputs.release-tag }}"
          git push